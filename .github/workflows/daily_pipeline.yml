name: Threnne Daily Data Engine

# When does this run?
on:
  schedule:
    # Every day at 8:00 AM UTC (~3 AM Eastern / 2 AM Central)
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    # Align with GitHub’s Node 24 default for JavaScript actions (see 2025-09-19 changelog)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write
      issues: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v5

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 📦 Install Dependencies
        run: |
          pip install pandas pyarrow numpy
          # Scraper deps when wired: pip install requests beautifulsoup4

      - name: 🕸️ Run Daily Scraper
        run: |
          echo "Running Scraper..."
          # python scrapers/your_scraper_script.py

      - name: 🔍 Scan for New Unmapped Tropes
        run: python engine/05_find_unmapped_tropes.py

      - name: ⚙️ Rebuild Parquet Engine
        run: |
          python engine/02_process_modern.py \
            --input_dir data/raw/epoch_3_forecast \
            --output data/processed/epoch_3_forecast.parquet

      - name: 🧮 Recalculate Threnne Math (Lift & Stacks)
        run: |
          python engine/03_calculate_lift.py \
            --baseline data/processed/epoch_1_baseline.parquet \
            --modern data/processed/epoch_3_forecast.parquet \
            --modern_name epoch3 \
            --output data/exports/forecast_report.csv
          python engine/04_trope_stacking.py \
            --baseline data/processed/epoch_1_baseline.parquet \
            --modern data/processed/epoch_3_forecast.parquet \
            --modern_name epoch3 \
            --output data/exports/forecast_stacks_report.csv \
            --min_books 3

      - name: 🚨 Alert Human (Create Review Issue)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALERTS="backtester/data/exports/unmapped_alerts.csv"
          if [ ! -f "$ALERTS" ]; then
            echo "No alert file; skipping issue step."
            exit 0
          fi
          LINES=$(wc -l < "$ALERTS")
          if [ "$LINES" -gt 1 ]; then
            echo "New terminology detected! Creating GitHub Issue..."
            EXISTING=$(gh issue list --search "Review New Taxonomy in:title" --state open --json number --jq 'length')
            if [ "$EXISTING" -eq 0 ]; then
              BODY="The Threnne daily scraper found new unmapped shelf tags appearing on 3+ books. Please review \`backtester/data/exports/unmapped_alerts.csv\` and add them to either \`taxonomy/trope_dictionary.json\` or the ignore list in \`engine/05_find_unmapped_tropes.py\`."
              gh label create data-review --color FF3366 --description "Taxonomy / data QA" 2>/dev/null || true
              gh issue create --title "🚨 Review New Taxonomy" --body "$BODY" --label data-review
            fi
          else
            echo "Taxonomy is clean. No alerts needed."
          fi

      - name: 💾 Commit & Push Updated Data
        run: |
          git config user.name "Threnne Intelligence Bot"
          git config user.email "bot@threnne.com"
          git add data/processed/epoch_3_forecast.parquet data/exports/forecast_report.csv data/exports/forecast_stacks_report.csv data/exports/unmapped_shelves.csv backtester/data/exports/unmapped_alerts.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: Daily Threnne Engine recalculation"
            git push
          fi
